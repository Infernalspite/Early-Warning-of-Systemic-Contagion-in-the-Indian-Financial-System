services:
  - type: web
    name: early-warning-systemic-contagion
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api/live_score.py
    envVars:
      - key: YF_CACHE_DIR
        value: /tmp/yfinance_cache
    healthCheckPath: /api/live_score
    autoDeploy: true
